<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finance Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background: '#1a1a2e',
            card: '#252542',
            border: '#3a3a5c',
            income: '#22c55e',
            expense: '#ef4444',
            muted: '#6b7280',
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #1a1a2e;
    }
  </style>
</head>
<body class="min-h-screen text-white p-4 md:p-8">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <header class="mb-8">
      <h1 class="text-3xl font-bold">Finance Dashboard</h1>
      <p class="text-muted mt-1">Track your income and expenses</p>
    </header>

    <!-- Summary Cards -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
      <!-- Total Income Card -->
      <div class="bg-card rounded-xl p-6 border border-border">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-muted text-sm font-medium">Total Income</p>
            <p id="totalIncome" class="text-2xl font-bold text-income mt-1">$0.00</p>
          </div>
          <div class="w-12 h-12 bg-income/20 rounded-full flex items-center justify-center">
            <svg class="w-6 h-6 text-income" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Total Expenses Card -->
      <div class="bg-card rounded-xl p-6 border border-border">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-muted text-sm font-medium">Total Expenses</p>
            <p id="totalExpenses" class="text-2xl font-bold text-expense mt-1">$0.00</p>
          </div>
          <div class="w-12 h-12 bg-expense/20 rounded-full flex items-center justify-center">
            <svg class="w-6 h-6 text-expense" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"/>
            </svg>
          </div>
        </div>
      </div>

      <!-- Net Profit Card -->
      <div class="bg-card rounded-xl p-6 border border-border">
        <div class="flex items-center justify-between">
          <div>
            <p class="text-muted text-sm font-medium">Net Profit</p>
            <p id="netProfit" class="text-2xl font-bold mt-1">$0.00</p>
          </div>
          <div id="profitIcon" class="w-12 h-12 bg-income/20 rounded-full flex items-center justify-center">
            <svg class="w-6 h-6 text-income" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content Grid -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
      <!-- Add Transaction Form -->
      <div class="bg-card rounded-xl p-6 border border-border">
        <h2 class="text-xl font-semibold mb-4">Add Transaction</h2>
        <form id="transactionForm" class="space-y-4">
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-muted mb-2">Type</label>
              <select id="type" class="w-full bg-background border border-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-income">
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-muted mb-2">Category</label>
              <select id="category" class="w-full bg-background border border-border rounded-lg px-4 py-2.5 text-white focus:outline-none focus:ring-2 focus:ring-income">
                <option value="Salary">Salary</option>
                <option value="Freelance">Freelance</option>
                <option value="Investment">Investment</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Bills">Bills</option>
                <option value="Shopping">Shopping</option>
                <option value="Other">Other</option>
              </select>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-muted mb-2">Description</label>
            <input type="text" id="description" placeholder="Enter description" required
              class="w-full bg-background border border-border rounded-lg px-4 py-2.5 text-white placeholder-muted focus:outline-none focus:ring-2 focus:ring-income">
          </div>
          <div>
            <label class="block text-sm font-medium text-muted mb-2">Amount</label>
            <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required
              class="w-full bg-background border border-border rounded-lg px-4 py-2.5 text-white placeholder-muted focus:outline-none focus:ring-2 focus:ring-income">
          </div>
          <button type="submit" class="w-full bg-income hover:bg-income/90 text-white font-medium py-2.5 rounded-lg transition-colors">
            Add Transaction
          </button>
        </form>
      </div>

      <!-- Chart -->
      <div class="bg-card rounded-xl p-6 border border-border">
        <h2 class="text-xl font-semibold mb-4">Income vs Expenses</h2>
        <div class="h-64">
          <canvas id="chart"></canvas>
        </div>
      </div>
    </div>

    <!-- Transactions Table -->
    <div class="bg-card rounded-xl border border-border overflow-hidden">
      <div class="p-6 border-b border-border">
        <h2 class="text-xl font-semibold">Recent Transactions</h2>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-background/50">
            <tr>
              <th class="text-left px-6 py-3 text-sm font-medium text-muted">Date</th>
              <th class="text-left px-6 py-3 text-sm font-medium text-muted">Description</th>
              <th class="text-left px-6 py-3 text-sm font-medium text-muted">Category</th>
              <th class="text-left px-6 py-3 text-sm font-medium text-muted">Type</th>
              <th class="text-right px-6 py-3 text-sm font-medium text-muted">Amount</th>
              <th class="text-right px-6 py-3 text-sm font-medium text-muted">Action</th>
            </tr>
          </thead>
          <tbody id="transactionsTable" class="divide-y divide-border">
            <!-- Transactions will be inserted here -->
          </tbody>
        </table>
      </div>
      <div id="emptyState" class="p-12 text-center text-muted hidden">
        <p>No transactions yet. Add your first transaction above.</p>
      </div>
    </div>
  </div>

  <script>
    // Transaction data storage
    let transactions = [
      { id: 1, date: '2024-03-01', description: 'Monthly Salary', category: 'Salary', type: 'income', amount: 5000 },
      { id: 2, date: '2024-03-02', description: 'Grocery Shopping', category: 'Food', type: 'expense', amount: 150 },
      { id: 3, date: '2024-03-03', description: 'Freelance Project', category: 'Freelance', type: 'income', amount: 800 },
      { id: 4, date: '2024-03-05', description: 'Electric Bill', category: 'Bills', type: 'expense', amount: 120 },
      { id: 5, date: '2024-03-07', description: 'Movie Night', category: 'Entertainment', type: 'expense', amount: 45 },
    ];

    let chart = null;

    // Initialize the app
    function init() {
      renderTransactions();
      updateSummary();
      renderChart();
      setupForm();
    }

    // Format currency
    function formatCurrency(amount) {
      return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD'
      }).format(amount);
    }

    // Update summary cards
    function updateSummary() {
      const income = transactions
        .filter(t => t.type === 'income')
        .reduce((sum, t) => sum + t.amount, 0);
      
      const expenses = transactions
        .filter(t => t.type === 'expense')
        .reduce((sum, t) => sum + t.amount, 0);
      
      const profit = income - expenses;

      document.getElementById('totalIncome').textContent = formatCurrency(income);
      document.getElementById('totalExpenses').textContent = formatCurrency(expenses);
      
      const profitEl = document.getElementById('netProfit');
      profitEl.textContent = formatCurrency(profit);
      profitEl.className = `text-2xl font-bold mt-1 ${profit >= 0 ? 'text-income' : 'text-expense'}`;

      const profitIcon = document.getElementById('profitIcon');
      profitIcon.className = `w-12 h-12 ${profit >= 0 ? 'bg-income/20' : 'bg-expense/20'} rounded-full flex items-center justify-center`;
      profitIcon.querySelector('svg').className = `w-6 h-6 ${profit >= 0 ? 'text-income' : 'text-expense'}`;
    }

    // Render transactions table
    function renderTransactions() {
      const tbody = document.getElementById('transactionsTable');
      const emptyState = document.getElementById('emptyState');

      if (transactions.length === 0) {
        tbody.innerHTML = '';
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      tbody.innerHTML = transactions.map(t => `
        <tr class="hover:bg-background/30 transition-colors">
          <td class="px-6 py-4 text-sm">${new Date(t.date).toLocaleDateString()}</td>
          <td class="px-6 py-4 text-sm font-medium">${t.description}</td>
          <td class="px-6 py-4 text-sm text-muted">${t.category}</td>
          <td class="px-6 py-4">
            <span class="inline-flex px-2.5 py-1 rounded-full text-xs font-medium ${
              t.type === 'income' 
                ? 'bg-income/20 text-income' 
                : 'bg-expense/20 text-expense'
            }">
              ${t.type.charAt(0).toUpperCase() + t.type.slice(1)}
            </span>
          </td>
          <td class="px-6 py-4 text-sm text-right font-medium ${t.type === 'income' ? 'text-income' : 'text-expense'}">
            ${t.type === 'income' ? '+' : '-'}${formatCurrency(t.amount)}
          </td>
          <td class="px-6 py-4 text-right">
            <button onclick="deleteTransaction(${t.id})" class="text-muted hover:text-expense transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
              </svg>
            </button>
          </td>
        </tr>
      `).join('');
    }

    // Render chart
    function renderChart() {
      const ctx = document.getElementById('chart').getContext('2d');
      
      // Group by month
      const monthlyData = {};
      transactions.forEach(t => {
        const month = new Date(t.date).toLocaleDateString('en-US', { month: 'short' });
        if (!monthlyData[month]) {
          monthlyData[month] = { income: 0, expense: 0 };
        }
        monthlyData[month][t.type] += t.amount;
      });

      const labels = Object.keys(monthlyData);
      const incomeData = labels.map(m => monthlyData[m].income);
      const expenseData = labels.map(m => monthlyData[m].expense);

      if (chart) {
        chart.destroy();
      }

      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels.length > 0 ? labels : ['No Data'],
          datasets: [
            {
              label: 'Income',
              data: incomeData.length > 0 ? incomeData : [0],
              backgroundColor: '#22c55e',
              borderRadius: 6,
            },
            {
              label: 'Expenses',
              data: expenseData.length > 0 ? expenseData : [0],
              backgroundColor: '#ef4444',
              borderRadius: 6,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                color: '#9ca3af',
                padding: 20,
                usePointStyle: true,
              }
            }
          },
          scales: {
            x: {
              grid: {
                display: false,
              },
              ticks: {
                color: '#9ca3af',
              }
            },
            y: {
              grid: {
                color: '#3a3a5c',
              },
              ticks: {
                color: '#9ca3af',
                callback: function(value) {
                  return '$' + value;
                }
              }
            }
          }
        }
      });
    }

    // Setup form submission
    function setupForm() {
      document.getElementById('transactionForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const transaction = {
          id: Date.now(),
          date: new Date().toISOString().split('T')[0],
          type: document.getElementById('type').value,
          category: document.getElementById('category').value,
          description: document.getElementById('description').value,
          amount: parseFloat(document.getElementById('amount').value),
        };

        transactions.unshift(transaction);
        
        renderTransactions();
        updateSummary();
        renderChart();
        
        this.reset();
      });
    }

    // Delete transaction
    function deleteTransaction(id) {
      transactions = transactions.filter(t => t.id !== id);
      renderTransactions();
      updateSummary();
      renderChart();
    }

    // Initialize on load
    init();
  </script>
</body>
</html>
